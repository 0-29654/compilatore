name: Build Compilatore Alunni Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSYS2 UCRT64 con GCC C++17
        id: msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc

      - name: Pubblica CV+ e copia fisicamente GCC
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          Get-ChildItem . -Directory |
            Where-Object { $_.Name -like 'backup_*' -or $_.Name -like 'COMPILATORE_*' } |
            Remove-Item -Recurse -Force -ErrorAction SilentlyContinue

          Remove-Item .\publish -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force .\publish\compiler\ucrt64 | Out-Null

          dotnet restore .\CppStudentClient.csproj
          dotnet publish .\CppStudentClient.csproj -c Release -r win-x64 --self-contained true -p:SelfContained=true -p:UseAppHost=true -p:PublishSingleFile=false -p:DebugType=None -p:DebugSymbols=false -o .\publish

          # Verifica obbligatoria dell'eseguibile principale.
          # Una Release non deve essere creata se CppStudentClient.exe manca.
          $appExe = (Resolve-Path .\publish).Path | Join-Path -ChildPath 'CppStudentClient.exe'

          if (-not (Test-Path $appExe)) {
            Write-Host 'CppStudentClient.exe non trovato. Contenuto principale di publish:'
            Get-ChildItem .\publish -File |
              Sort-Object Name |
              Format-Table Name, Length -AutoSize |
              Out-String |
              Write-Host

            # Recupero prudente: se dotnet ha prodotto un solo eseguibile
            # applicativo nella radice di publish con un nome diverso,
            # lo copia con il nome atteso dall'installer.
            $candidateApps = @(
              Get-ChildItem .\publish -File -Filter '*.exe' |
              Where-Object {
                $_.Name -notin @('test17.exe', 'g++.exe', 'gcc.exe')
              }
            )

            if ($candidateApps.Count -eq 1) {
              Write-Host "Eseguibile applicativo trovato con nome diverso: $($candidateApps[0].FullName)"
              Copy-Item $candidateApps[0].FullName $appExe -Force
            }
          }

          if (-not (Test-Path $appExe)) {
            throw 'CppStudentClient.exe non prodotto da dotnet publish. Release annullata.'
          }

          $appExeSize = (Get-Item $appExe).Length
          if ($appExeSize -lt 50KB) {
            throw "CppStudentClient.exe anormalmente piccolo: $appExeSize byte"
          }

          Write-Host "Applicazione prodotta correttamente: $appExe"
          Write-Host "Dimensione applicazione: $([math]::Round($appExeSize / 1KB, 1)) KB"

          $msysRoot = '${{ steps.msys2.outputs.msys2-location }}'
          if ([string]::IsNullOrWhiteSpace($msysRoot)) { throw 'setup-msys2 non ha restituito msys2-location' }

          $source = Join-Path $msysRoot 'ucrt64'
          $dest = (Resolve-Path .\publish\compiler\ucrt64).Path
          if (-not (Test-Path (Join-Path $source 'bin\g++.exe'))) {
            throw "g++.exe non trovato nel runner: $source\bin\g++.exe"
          }

          Write-Host "Copia fisica GCC da: $source"
          Write-Host "Copia fisica GCC a : $dest"
          & robocopy $source $dest /E /COPY:DAT /DCOPY:DAT /R:2 /W:1 /NFL /NDL /NP
          $rc = $LASTEXITCODE
          if ($rc -gt 7) { throw "Robocopy GCC fallito con codice $rc" }

          $gpp = Join-Path $dest 'bin\g++.exe'
          $cc1 = Get-ChildItem $dest -Recurse -Filter cc1plus.exe -File | Select-Object -First 1
          if (-not (Test-Path $gpp)) { throw "g++.exe non copiato: $gpp" }
          if (-not $cc1) { throw 'cc1plus.exe non copiato' }
          if (-not (Test-Path (Join-Path $dest 'include\c++'))) { throw 'Header C++ non copiati' }
          if (-not (Test-Path (Join-Path $dest 'lib'))) { throw 'Librerie GCC non copiate' }

          $env:PATH = "$(Split-Path $gpp);$env:PATH"
          @(
            '#include <iostream>',
            'int main(){ std::cout << "C++17 OK"; return 0; }'
          ) | Set-Content .\test17.cpp -Encoding ascii
          & $gpp -std=c++17 .\test17.cpp -o .\test17.exe
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path .\test17.exe)) {
            throw 'Test C++17 fallito prima del setup'
          }

          $size = (Get-ChildItem $dest -Recurse -File | Measure-Object Length -Sum).Sum
          if ($size -lt 100MB) {
            throw "Toolchain GCC incompleto: $([math]::Round($size/1MB,1)) MB"
          }

          "MSYS2 root: $msysRoot" | Set-Content .\publish\compiler_manifest.txt
          "Toolchain bytes: $size" | Add-Content .\publish\compiler_manifest.txt
          "g++: $gpp" | Add-Content .\publish\compiler_manifest.txt
          Get-ChildItem $dest -Recurse -File | ForEach-Object FullName | Set-Content .\publish\compiler_file_list.txt

      - name: Installa Inno Setup
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - name: Crea installer
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:ProgramFiles\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { throw 'ISCC.exe non trovato' }


          $appExe = '.\publish\CppStudentClient.exe'
          if (-not (Test-Path $appExe)) {
            Write-Host 'File presenti nella radice di publish:'
            Get-ChildItem .\publish -File |
              Sort-Object Name |
              Format-Table Name, Length -AutoSize |
              Out-String |
              Write-Host
            throw 'CppStudentClient.exe assente da publish prima di Inno Setup'
          }

          if (-not (Test-Path .\publish\compiler\ucrt64\bin\g++.exe)) {
            throw 'g++.exe assente da publish prima di Inno Setup'
          }

          & $iscc .\setup_student.iss
          if ($LASTEXITCODE -ne 0) { throw 'Compilazione Inno Setup fallita' }

          $setup = '.\installer\CppStudentClient_Setup.exe'
          if (-not (Test-Path $setup)) { throw 'Installer non creato' }
          $setupSize = (Get-Item $setup).Length
          if ($setupSize -lt 40MB) {
            throw "Installer anormalmente piccolo: $([math]::Round($setupSize/1MB,1)) MB. GCC non incluso."
          }

      - name: Verifica realmente l'installer prodotto
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $verify = Join-Path $env:RUNNER_TEMP 'cvplus_verify'
          Remove-Item $verify -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $verify | Out-Null

          $args = @('/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART',"/DIR=$verify")
          $p = Start-Process .\installer\CppStudentClient_Setup.exe -ArgumentList $args -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Installazione di verifica fallita: exit code $($p.ExitCode)" }

          $installedApp = Join-Path $verify 'CppStudentClient.exe'
          if (-not (Test-Path $installedApp)) {
            Write-Host 'File installati nella cartella di verifica:'
            Get-ChildItem $verify -Recurse -File |
              Select-Object FullName, Length |
              Format-Table -AutoSize |
              Out-String |
              Write-Host
            throw "CppStudentClient.exe assente dopo installazione: $installedApp"
          }

          $installedAppSize = (Get-Item $installedApp).Length
          if ($installedAppSize -lt 50KB) {
            throw "CppStudentClient.exe installato ma anormalmente piccolo: $installedAppSize byte"
          }

          Write-Host "Eseguibile applicazione verificato dopo installazione: $installedApp"

          $gpp = Join-Path $verify 'compiler\ucrt64\bin\g++.exe'
          if (-not (Test-Path $gpp)) { throw "g++.exe assente dopo installazione: $gpp" }

          $env:PATH = "$(Split-Path $gpp);$env:PATH"
          @(
            '#include <iostream>',
            'int main(){ std::cout << "INSTALLER C++17 OK"; return 0; }'
          ) | Set-Content (Join-Path $verify 'verify.cpp') -Encoding ascii

          & $gpp -std=c++17 (Join-Path $verify 'verify.cpp') -o (Join-Path $verify 'verify.exe')
          if ($LASTEXITCODE -ne 0 -or -not (Test-Path (Join-Path $verify 'verify.exe'))) {
            throw 'Test C++17 dopo installazione fallito'
          }

      - name: Crea GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $stamp = Get-Date -Format 'yyyyMMdd-HHmmss'
          $sha = '${{ github.sha }}'.Substring(0,7)
          $tag = "compilatore-alunni-1.7.6-$stamp-$sha"
          gh release create $tag .\installer\CppStudentClient_Setup.exe .\publish\compiler_manifest.txt .\publish\compiler_file_list.txt --title "CV+ Compilatore Alunno 1.7.6 - installer compatibile e verificato" --notes "Installer 1.7.6 verificato: applicazione, GCC e risorse presenti dopo installazione.`nCommit: ${{ github.sha }}`nBranch: ${{ github.ref_name }}"

